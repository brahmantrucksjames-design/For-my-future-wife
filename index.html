<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Malikam 🫂❤️</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#ff4d6d,#6a11cb,#1a1a40);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.letter-box{
  width:350px;
  height:250px;
  background:#fff;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  position:relative;
  cursor:pointer;
  transition:0.4s;
}

.letter-box:hover{
  transform:scale(1.05);
}

.letter{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  overflow:auto;
  padding:30px;
  color:white;
}

.letter-content{
  max-width:800px;
  margin:auto;
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
  line-height:1.8;
  white-space:pre-wrap;
}

button{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="letter-box" onclick="openLetter()">
</div>

<div class="letter" id="letter">
  <div class="letter-content">

Malikam 🫂❤️🫠
Bugun biz uchun eng yaxshi kunligini unutmagandirsiz❤️ 2 yil oldin aynan shu kun xayotimga moʻjiza kirib kelgan kun...

(⬇️ BU YERGA SENING TO‘LIQ MATNINGNI QO‘YASAN ⬇️)

  <button onclick="closeLetter()">Yopish ❤️</button>
  </div>
</div>

<script>
function openLetter(){
  document.getElementById("letter").style.display="block";
}

function closeLetter(){
  document.getElementById("letter").style.display="none";
}
</script>

</body>
</html>
