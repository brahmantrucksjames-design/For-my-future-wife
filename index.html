<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malikam ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:#1a1a40;
position:relative;
}

/* background slideshow */
.bg-slides{
position:fixed;
inset:0;
z-index:-3;
overflow:hidden;
}

.bg-slide{
position:absolute;
inset:0;
background-size:cover;
background-position:center;
background-repeat:no-repeat;
opacity:0;
animation:bgFade 25s infinite;
transform:scale(1.05);
}

.bg-slide::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.35);
}

.bg-slide:nth-child(1){animation-delay:0s;}
.bg-slide:nth-child(2){animation-delay:5s;}
.bg-slide:nth-child(3){animation-delay:10s;}
.bg-slide:nth-child(4){animation-delay:15s;}
.bg-slide:nth-child(5){animation-delay:20s;}

@keyframes bgFade{
0%{opacity:0;}
8%{opacity:1;}
20%{opacity:1;}
28%{opacity:0;}
100%{opacity:0;}
}

/* romantic glow overlay */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(255,255,255,.18),transparent 25%),
radial-gradient(circle at 80% 30%,rgba(255,182,193,.14),transparent 28%),
radial-gradient(circle at 50% 80%,rgba(255,255,255,.08),transparent 30%);
pointer-events:none;
z-index:-2;
}

/* floating hearts */
.heart{
position:fixed;
color:#ffb3c1;
font-size:20px;
animation:float 8s linear infinite;
pointer-events:none;
will-change:transform,opacity;
filter:drop-shadow(0 0 8px rgba(255,255,255,.35));
z-index:0;
}

@keyframes float{
0%{
transform:translateY(100vh) scale(.8);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh) scale(1.2);
opacity:0;
}
}

/* sparkles */
.sparkle{
position:fixed;
width:6px;
height:6px;
border-radius:50%;
background:rgba(255,255,255,.9);
box-shadow:0 0 12px rgba(255,255,255,.9);
animation:sparkleMove 6s linear infinite;
pointer-events:none;
z-index:0;
}

@keyframes sparkleMove{
0%{
transform:translateY(100vh) scale(.5);
opacity:0;
}
15%{
opacity:1;
}
100%{
transform:translateY(-110vh) scale(1.4);
opacity:0;
}
}

/* OPEN BUTTON */
.letter-box{
width:350px;
height:220px;
background:rgba(255,255,255,.92);
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
font-size:28px;
box-shadow:0 15px 40px rgba(0,0,0,.35);
transition:.3s;
position:relative;
z-index:1;
}

.letter-box:hover{
transform:scale(1.05);
}

/* MUSIC BUTTON */
.music-btn{
position:fixed;
top:20px;
right:20px;
z-index:20;
padding:10px 16px;
border:none;
border-radius:999px;
background:rgba(255,77,109,.95);
color:#fff;
cursor:pointer;
font-size:14px;
box-shadow:0 8px 20px rgba(0,0,0,.25);
}

/* LETTER */
.letter{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:10;
}

.letter-content{
width:min(900px,95vw);
max-height:85vh;
overflow-y:auto;
padding:25px;
border-radius:20px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(10px);
color:white;
line-height:1.8;
}

#typedText{
white-space:pre-wrap;
}

#typedText::after{
content:"|";
animation:blink .8s infinite;
}

@keyframes blink{
50%{
opacity:0;
}
}

.letter-image{
margin-top:20px;
width:100%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
}

.letter-image img{
width:100%;
height:180px;
border-radius:18px;
object-fit:cover;
box-shadow:0 10px 30px rgba(0,0,0,.35);
border:2px solid rgba(255,255,255,.25);
}

button{
margin-top:20px;
padding:12px 24px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
cursor:pointer;
font-size:16px;
}
</style>
</head>
<body>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<audio id="bgMusic2" loop>
<source src="music2.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()" id="musicBtn">🎵 Play Music</button>

<div class="bg-slides">
<div class="bg-slide" style="background-image:url('b1.jpg')"></div>
<div class="bg-slide" style="background-image:url('b2.jpg')"></div>
<div class="bg-slide" style="background-image:url('b3.jpg')"></div>
<div class="bg-slide" style="background-image:url('b4.jpg')"></div>
<div class="bg-slide" style="background-image:url('b5.jpg')"></div>
</div>

<div class="letter-box" onclick="openLetter()">
💌 XATNI OCHISH ❤️
</div>

<div class="letter" id="letter">
<div class="letter-content">
<div id="typedText"></div>

<div class="letter-image">
<img src="b1.jpg" alt="Our picture 1">
<img src="b2.jpg" alt="Our picture 2">
<img src="b3.jpg" alt="Our picture 3">
<img src="b4.jpg" alt="Our picture 4">
<img src="b5.jpg" alt="Our picture 5">
</div>

<button onclick="closeLetter()">Yopish ❤️</button>
</div>
</div>

<script>
const text = `
Malikam 🫂❤️🫠
Bugun biz uchun eng yaxshi kunligini unutmagandirsiz❤️ 2 yil oldin aynan shu kun xayotimga moʻjiza kirib kelgan kun xayotimga rang kirgan kun xayotimi xaqiqiy mazmunini topgan kunim yani farishtam sizi uchratgan kunim siz bilan tanishgan kunimiz🫂❤️ bilasizmi malikam siz dunyodegi eng samimiy begʻubor qizligizi tanishgan kunimizi birinchi onidayoq bilgandim❤️🫠 oradan roppa rosa 2 yil vaqt oʻtdi xayotim😘❤️ toʻgʻri bu vaqt orasida koʻp gaplashme qoldik lekin ikkalamiz ham ishonamizki osha paytdayam ruhan birga edik yonimizda tasavvur qildik bir birimizi qalbimiz bilan sevdik ❤️🫂 man bunaqa sevgini xech kimda kormaganman va bizi sevgimizi eng samimiyligiga juda qattiq ishonaman❤️🫂 bilaman koʻp qiyinchiliklarni boshdan oʻtkazdik man sizi koʻp xafa qildim lekin unutmen malikam man xar doim sizi sevaman xurmat qilaman sizi qadriz esa judayam balandda siz man uchun farishtasiz❤️ mojizam❤️ goʻzalim❤️ yoqimtoyim ❤️kichkintoyim❤️ shirincham ❤️asalim❤️ begʻuborim ❤️farishtam❤️ malikam mani 🫠❤️ sizi uchratganimdan beri asl yure qanaqa urushini baxt nimaligi sevgi qanaqa xisligini nimaligini angladim gulim❤️🫂 bilmadim sizsiz xayot umuman qorongʻu boʻlsa kere sizgacha qanaqa yashaganimi ham unutdim❤️ bilaszmi malikam biz xatto xali uchrashmasdan masofadan turib shunchali bir birimizga baxt ulashvomiz ❤️ xali ham birgamiz xuddi uzoqdan urib turgan yuregimizdek ❤️🫀 man ishonaman biz albatta koʻrishamiz va xammasiga rostanam erishsa bolishini isbotlemiz 🫂❤️ siz mani komillikka bogan yoʻlimga oxshesiz malikam iforiz ham jannatniki sizi mingta xurga alishmiman malikam 🫂❤️ inshaAlloh nasib qilsin malikam keyingi 24- iyunda 3 yilligimizi yonizda qulizdan tutib gullar bilan kutib olishimizi❤️🫠 shuncha vaqt ichida sizga xatto arziydigan insonni ishini qilmagan boʻlsam ham mani xar qanaqa vaziyatda yonimda bolganiz uchun xar doim qoʻllab quvvatlaganiz uchun raxmat malikam ❤️xayotimda borligiz uchun raxmat ❤️begʻuborligiz uchun raxmat❤️ xayotim siz judayam yaxshi qizsiz siz dunyodagi eng yaxshi qizsiz 🫠❤️ bilasizmi bugunga mani rejalarim juda kotta edi xozir bu oddiy soʻzlarga oʻxshab tuyular lekin qilmoqchi boʻlganlarim koʻp edi bu safar nimagadir ishlarim ancha vaqt yurishme qoldi lekin bu narsalar kotta rol oʻynamasligini bilaman va bu xayolga ham siz orqali ishonganim uchun sizga rahmat ❤️🫂 yaxshiyam borsiz malikam siz Allohga yaqinlashtiruvchi insonsiz farishtamsiz malikam❤️🫂🫠 ishonasizmi bu yozganlarimni oddiy yozmadim xar bir siz bilan utgan xotiralar bilan eslab yozdim toʻgʻrisi yuzimda tabassum koʻzim nam judayam zoʻr xis ❤️🫠sizi uchratganim uchun Alhamdulillah malikam❤️🫠 shuncha vaqt yonimda bolganiz uchun xali sizi xamma orzularizga yetishtiradigan biri boʻlib oldizga boraman ❤️🫂 balki aynan shu kunlarda qiyin vaziyatga tushib qolganim ham sinovdir gulim chunki xar bir sinov qalbimizi bir birimizga yaqinlashtirvotti ❤️🫠🫂 man sizga ishonaman xar doim ishonaman siz ishonchimi oqlesiz yonizga borgunimcha oʻzizi xammadan asra olasiz🫂❤️ borganimdan keyin oʻzim sizi xamma xammasidan asreman malikam❤️🫠 Xayotimda borligiz uchun raxmat malikam gapiradigan yozadigan gaplarim judayam koʻp va xech bir soʻz gap matn xatto sizga boʻlgan sevgimi bir foizini ham tasvirlab berolmedi ❤️🫂 shunchasini oʻqiganiz uchun ham raxmat malikam bu gaplar mani chin yuregmdan chiqqan sozlardir❤️🫀 bugungi kunimiz unutilmas judayam chiroyli kun boʻlib qolsin xatto 50 yillik 70 yilliklarimizni ham birga nishonlashimiz nasib qilsin inshaAllah malikam sizi judayam qattiq sevaman 🫂❤️ yana bir bor tabrikleman malikam🫠🫠🫠🫠🫠🫠❤️❤️❤️❤️❤️❤️❤️❤️🥳🥳🥳🥳🥳🥳🥳
`;

let typingTimer = null;
let started = false;
let musicPlaying = false;

function openLetter(){
document.getElementById("letter").style.display = "flex";
playBothMusic();
if (!started) {
started = true;
typeWriter();
}
}

function closeLetter(){
document.getElementById("letter").style.display = "none";
}

function typeWriter(){
const target = document.getElementById("typedText");
target.textContent = "";
let i = 0;
const speed = 15;

typingTimer = setInterval(() => {
if (i < text.length) {
target.textContent += text.charAt(i++);
} else {
clearInterval(typingTimer);
typingTimer = null;
}
}, speed);
}

function playBothMusic(){
const music1 = document.getElementById("bgMusic");
const music2 = document.getElementById("bgMusic2");
const btn = document.getElementById("musicBtn");

music1.volume = 1;
music2.volume = 0.25;

music1.play().catch(() => {});
music2.play().catch(() => {});
btn.textContent = "⏸ Pause Music";
musicPlaying = true;
}

function toggleMusic(){
const music1 = document.getElementById("bgMusic");
const music2 = document.getElementById("bgMusic2");
const btn = document.getElementById("musicBtn");

if (musicPlaying) {
music1.pause();
music2.pause();
btn.textContent = "🎵 Play Music";
} else {
music1.play().catch(() => {});
music2.play().catch(() => {});
music1.volume = 1;
music2.volume = 0.25;
btn.textContent = "⏸ Pause Music";
}
musicPlaying = !musicPlaying;
}

/* HEARTS */
function createHeart(){
const heart = document.createElement("div");
heart.className = "heart";
heart.textContent = "❤️";
heart.style.left = Math.random() * 100 + "vw";
heart.style.fontSize = (15 + Math.random() * 25) + "px";
heart.style.animationDuration = (5 + Math.random() * 5) + "s";
document.body.appendChild(heart);
setTimeout(() => heart.remove(), 10000);
}

function createSparkle(){
const sparkle = document.createElement("div");
sparkle.className = "sparkle";
sparkle.style.left = Math.random() * 100 + "vw";
sparkle.style.animationDuration = (4 + Math.random() * 4) + "s";
document.body.appendChild(sparkle);
setTimeout(() => sparkle.remove(), 9000);
}

setInterval(createHeart, 400);
setInterval(createSparkle, 250);
</script>

</body>
</html>

</body>
</html>
